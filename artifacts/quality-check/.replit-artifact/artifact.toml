kind = "web"
previewPath = "/"
title = "Quality Check"
version = "1.0.0"
id = "artifacts/quality-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20776

[services.development]
run = "pnpm --filter @workspace/quality-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quality-check", "run", "build" ]
publicDir = "artifacts/quality-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20776"
BASE_PATH = "/"
